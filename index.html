<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazı Kazan Oyunu</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f8f8;
            flex-direction: column;
            overflow: hidden;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }
        .scratch-card {
            position: relative;
            width: 100px;
            height: 100px;
            user-select: none;
        }
        .cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            user-select: none;
        }
        .revealed {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            user-select: none;
        }
        #message {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <div id="message"></div>
    <div class="game-board" id="game-board"></div>
    <script>
        const rewards = {
            "./assets/bronz.png": "Bronz",
            "./assets/silver.png": "Silver",
            "./assets/gold.png": "Gold"
        };
        let revealedRewards = {"./assets/bronz.png": 0, "./assets/silver.png": 0, "./assets/gold.png": 0};

        function createScratchCard() {
            const card = document.createElement('div');
            card.classList.add('scratch-card');
            
            const reward = document.createElement('img');
            reward.classList.add('revealed');
            const rewardSrc = Object.keys(rewards)[Math.floor(Math.random() * Object.keys(rewards).length)];
            reward.src = rewardSrc;
            card.appendChild(reward);
            
            const cover = document.createElement('canvas');
            cover.classList.add('cover');
            cover.width = 100;
            cover.height = 100;
            
            const ctx = cover.getContext('2d');
            const img = new Image();
            img.src = './assets/cover.png';
            img.onload = function() {
                ctx.drawImage(img, 0, 0, cover.width, cover.height);
            }
            card.appendChild(cover);
            
            document.getElementById('game-board').appendChild(card);
            
            let isScratching = false;
            let clearedPixels = 0;
            const totalPixels = cover.width * cover.height;

            function startScratching(event) {
                event.preventDefault(); // Sayfanın kaymasını önle
                isScratching = true;
            }
            function stopScratching() {
                isScratching = false;
            }
            function scratch(event) {
                if (!isScratching) return;
                event.preventDefault();
                const rect = cover.getBoundingClientRect();
                const x = (event.touches ? event.touches[0].clientX : event.clientX) - rect.left;
                const y = (event.touches ? event.touches[0].clientY : event.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fill();

                const imageData = ctx.getImageData(0, 0, cover.width, cover.height);
                let pixels = imageData.data;
                let transparentPixels = 0;
                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] === 0) {
                        transparentPixels++;
                    }
                }
                let clearedPercentage = (transparentPixels / (totalPixels / 4)) * 100;
                if (clearedPercentage > 50) {
                    cover.style.display = 'none';
                    revealedRewards[rewardSrc]++;
                    setTimeout(() => checkWinCondition(rewardSrc), 300);
                }
            }
            
            cover.addEventListener('mousedown', startScratching);
            cover.addEventListener('mouseup', stopScratching);
            cover.addEventListener('mouseleave', stopScratching);
            cover.addEventListener('mousemove', scratch);
            
            cover.addEventListener('touchstart', startScratching, { passive: false });
            cover.addEventListener('touchend', stopScratching);
            cover.addEventListener('touchmove', scratch, { passive: false });
        }

        function checkWinCondition(winningReward) {
            for (const type in revealedRewards) {
                if (revealedRewards[type] >= 3) {
                    const rewardName = rewards[type];
                    document.getElementById('message').innerText = `Kazandın! ${rewardName}`;
                    alert(`Kazandın! ${rewardName}`);
                    return;
                }
            }
        }

        for (let i = 0; i < 9; i++) {
            createScratchCard();
        }
    </script>
</body>
</html>
